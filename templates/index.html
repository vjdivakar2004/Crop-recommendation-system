<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop recommendation system </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">


</head>
<body>
    <header class="bg-success text-white p-2">
        <h1>
            <marquee behavior="" direction="">
                Machine Learning based crop recommendation system 
            </marquee>
        </h1>
    </header>

    <div class="container">
        <form name ="f1" method="post" action="/login">
            <div class="form-group">
              <label for="exampleInputEmail1">User name </label>
              <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" name="username" required>
              <!--<small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>-->
            </div>
            <div class="form-group">
              <label for="exampleInputPassword1">Password</label>
              <input type="password" class="form-control" id="exampleInputPassword1" name="password" required>
            </div>
            <!--<div class="form-group form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1">
              <label class="form-check-label" for="exampleCheck1">Check me out</label>
            </div>-->

            <button type="submit" class="btn btn-primary">Login</button>
          </form>
    </div>
    

    {% if error %}
        <span class="text-center text-danger">
            <h1>Either username or password is wrong !!</h1>
        </span>
    {% endif %}
</body>
</html>
